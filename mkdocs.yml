site_name: Actualized.org Wiki
site_url: https://patrykwajs.github.io/Actualized-Wiki/
site_description: The complete knowledge base for Actualized.org — AI-generated summaries, full transcripts, and topic conclusions from 505 Leo Gura videos.
site_author: Patryk Wajs

repo_url: https://github.com/PatrykWajs/Actualized-Wiki
repo_name: PatrykWajs/Actualized-Wiki

theme:
  name: material
  palette:
    - scheme: slate
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: black
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.integrate
  font:
    text: Roboto
    code: Roboto Mono
  favicon: assets/images/favicon.svg
  icon:
    logo: material/eye-circle
    repo: fontawesome/brands/github

extra_css:
  - assets/stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/PatrykWajs/Actualized-Wiki
    - icon: fontawesome/brands/youtube
      link: https://www.youtube.com/@ActualizedOrg

plugins:
  - search:
      separator: '[\s\-,:!=\[\]()"`/]+|\.(?!\d)|&[lg]t;|(?!\b)(?=[A-Z][a-z])'
  - minify:
      minify_html: true

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page

nav:
  - Home: index.md
  - All Episodes: MAP.md
  - Conclusions:
      - Overview: Conclusions/index.md
      - Foundational: Conclusions/foundational.md
      - Happiness: Conclusions/happiness.md
      - Motivation: Conclusions/motivation.md
      - Productivity: Conclusions/productivity.md
      - Money: Conclusions/money.md
      - Emotions: Conclusions/emotions.md
      - Confidence: Conclusions/confidence.md
      - Psychedelics: Conclusions/psychedelics.md
      - Enlightenment & Meditation: Conclusions/enlightenment-and-meditation.md
      - Health & Fitness: Conclusions/health-and-fitness.md
      - Dating & Relationships: Conclusions/dating-and-relationships.md
      - Sex: Conclusions/sex.md
      - Depression: Conclusions/depression.md
      - Life Skills: Conclusions/life-skills.md
      - Miscellaneous: Conclusions/miscellaneous.md
